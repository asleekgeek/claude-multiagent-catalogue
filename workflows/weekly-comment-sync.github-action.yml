# Companion GitHub Actions runner for workflows/weekly-comment-sync.md
# Copy to .github/workflows/weekly-comment-sync.yml in the consumer's repo and adapt
# schedule / secrets / permissions as needed. Add ANTHROPIC_API_KEY to repo secrets.

name: Weekly Comment Sync

on:
  schedule:
    - cron: "0 9 * * 1"   # translated from upstream: "weekly"
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Claude Code agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt-file: .github/workflows-prompts/weekly-comment-sync.md
          allowed-tools: bash,gh
          model: claude-sonnet-4-6
