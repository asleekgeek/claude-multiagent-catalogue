# Companion GitHub Actions runner for workflows/ospo-contributors-report.md
# Copy to .github/workflows/ospo-contributors-report.yml in the consumer's repo and adapt
# schedule / secrets / permissions as needed. Add ANTHROPIC_API_KEY to repo secrets.

name: OSPO Contributors Report

on:
  schedule:
    - cron: "3 2 1 * *"   # translated from upstream: "3 2 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Claude Code agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt-file: .github/workflows-prompts/ospo-contributors-report.md
          allowed-tools: bash,gh
          model: claude-sonnet-4-6
